<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Checkout</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
    
    
        <a href="cart.html">
            Cart <span id="cartCount">(0)</span>
        </a>
    </nav>
</header>

<div class="checkout-container">

    <!-- ORDER SUMMARY -->
    <div class="checkout-summary">

        <h2>Order Summary</h2>

        <div id="checkoutItems"></div>

        <h3 id="checkoutSubtotal">Subtotal: $0</h3>
        <h3 id="checkoutShipping">Shipping: $0</h3>
        <h2 id="checkoutTotal">Total: $0</h2>

    </div>

    <!-- FORM -->
    <form id="checkoutForm">

        <h2>Customer Information</h2>

        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="text" placeholder="Address" required>

        <h2>Shipping Method</h2>

        <select id="shipping">
            <option value="10">Standard Shipping - $10</option>
            <option value="25">Express Shipping - $25</option>
            <option value="50">Premium Shipping - $50</option>
        </select>

        <h2>Credit Card</h2>

        <input type="text" placeholder="Card Number" required>
        <input type="text" placeholder="Card Holder" required>
        <input type="text" placeholder="MM/YY" required>
        <input type="text" placeholder="CVV" required>

        <button type="submit">Place Order</button>

    </form>

</div>

<!-- SCRIPTS -->
<script src="js/products.js"></script>
<script src="js/store.js"></script>
<script src="js/cart.js"></script>
<script src="js/checkout.js"></script>

<!-- TOAST -->
<div id="toast"></div>

</body>
</html>
